<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TempShot Preview</title>
  <style>
    /* Full-size preview page. A dedicated extension page (not a blob: URL
       opened from the popup) because blob URLs created in the popup die the
       moment the popup closes — this page loads the image from IndexedDB. */
    :root {
      --bg: #f2f3f5; --surface: #fff; --border: #e2e4e9;
      --text: #17181c; --muted: #6b7280; --accent: #4f46e5; --danger: #dc2626;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #121318; --surface: #1d1f27; --border: #33364a;
        --text: #eceef2; --muted: #9aa0ae; --accent: #6366f1; --danger: #f87171;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text);
    }
    .bar {
      position: sticky; top: 0; z-index: 2;
      display: flex; align-items: center; gap: 10px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 10px 16px;
    }
    .bar .info { flex: 1; min-width: 0; }
    .bar .title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar .sub { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    button {
      border: 1px solid var(--border); border-radius: 7px; padding: 6px 12px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      background: var(--bg); color: var(--text);
    }
    button:hover { border-color: var(--accent); }
    button.del { color: var(--danger); }
    button.del:hover { border-color: var(--danger); }
    .stage { padding: 20px; display: flex; justify-content: center; }
    .stage img {
      max-width: 100%; height: auto; display: block;
      border: 1px solid var(--border); border-radius: 8px; background: #fff;
    }
    .msg { text-align: center; color: var(--muted); padding: 60px 20px; }
  </style>
</head>
<body>
  <div class="bar">
    <img src="icons/icon32.png" alt="" width="20" height="20" />
    <div class="info">
      <div class="title" id="title">Loading…</div>
      <div class="sub" id="sub"></div>
    </div>
    <button id="copy">Copy</button>
    <button id="png">Download PNG</button>
    <button id="pdf">Download PDF</button>
    <button id="del" class="del">Delete</button>
  </div>
  <div class="stage"><img id="img" alt="Screenshot preview" hidden /></div>
  <p class="msg" id="msg" hidden>Screenshot not found — it may have been deleted or auto-expired.</p>
  <script type="module" src="preview.js"></script>
</body>
</html>
